name: Update Stats & Deploy to Hostinger

on:
  # Run daily at midnight UTC
  schedule:
    - cron: '0 0 * * *'
  # Also run on push to main (so manual pushes also deploy)
  push:
    branches: [main]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest articles
        run: node scripts/fetch_articles.js

      - name: Fetch latest stats & calendar data
        run: node scripts/fetch_stats.js

      - name: Commit updated data (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/articles.json src/data/stats.json src/data/calendar.json
          git diff --staged --quiet || git commit -m "chore: auto-update stats data [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push || true

      - name: Build production bundle
        run: npm run build

      - name: Deploy to Hostinger via SSH
        uses: easingthemes/ssh-deploy@v5
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
          SOURCE: "dist/"
          TARGET: ${{ secrets.REMOTE_TARGET }}
          ARGS: "-rlgoDzvc -i --delete"
